<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Tic Tac Toe</title>

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <div class="container">

        <h1>Tic Tac Toe</h1>

        <!-- Turn -->

        <h2 id="status">

            Player X Turn

        </h2>

        <!-- Game Board -->

        <div class="board">

            <div class="cell" data-index="0"></div>

            <div class="cell" data-index="1"></div>

            <div class="cell" data-index="2"></div>

            <div class="cell" data-index="3"></div>

            <div class="cell" data-index="4"></div>

            <div class="cell" data-index="5"></div>

            <div class="cell" data-index="6"></div>

            <div class="cell" data-index="7"></div>

            <div class="cell" data-index="8"></div>

        </div>

        <!-- Score -->

        <div class="scoreboard">

            <div>

                <h3>Player X</h3>

                <p id="scoreX">0</p>

            </div>

            <div>

                <h3>Draw</h3>

                <p id="draw">0</p>

            </div>

            <div>

                <h3>Player O</h3>

                <p id="scoreO">0</p>

            </div>

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button id="restart">

                Restart Game

            </button>

            <button id="newGame">

                New Game

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
